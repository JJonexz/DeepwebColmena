<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SoporteVivo — Chat de Atención al Cliente</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f4f8;font-family:Arial,sans-serif;color:#333;display:flex;flex-direction:column;height:100vh}
.hdr{background:#2563eb;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px}
.logo{font-size:17px;font-weight:700}
.status{font-size:11px;color:#bfdbfe;margin-left:auto}
.chat-wrap{flex:1;display:flex;align-items:flex-end;justify-content:center;padding:20px;overflow:hidden}
.chat-box{background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.12);width:100%;max-width:460px;display:flex;flex-direction:column;height:100%;max-height:460px}
.chat-hdr{background:#2563eb;color:#fff;padding:12px 16px;border-radius:12px 12px 0 0;display:flex;align-items:center;gap:10px}
.bot-av{width:32px;height:32px;background:#1d4ed8;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.bot-name{font-size:14px;font-weight:700}
.bot-status{font-size:11px;color:#bfdbfe}
.msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.msg-bot{background:#f1f5f9;padding:10px 14px;border-radius:0 10px 10px 10px;max-width:80%;font-size:13px;color:#444;line-height:1.5}
.msg-user{background:#2563eb;color:#fff;padding:10px 14px;border-radius:10px 0 10px 10px;max-width:80%;font-size:13px;align-self:flex-end}
.inp-area{padding:12px;border-top:1px solid #e5e7eb;display:flex;gap:8px}
.inp-area input{flex:1;border:1px solid #d1d5db;border-radius:20px;padding:9px 14px;font-size:13px;outline:none}
.inp-area input:focus{border-color:#2563eb}
.inp-area button{background:#2563eb;color:#fff;border:none;padding:9px 16px;border-radius:20px;cursor:pointer;font-size:13px}
/* HIDDEN: typing "admin" in chat shows secret option */
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">💬 SoporteVivo</div>
  <div class="status">🟢 Operadores disponibles</div>
</div>
<div class="chat-wrap">
  <div class="chat-box">
    <div class="chat-hdr">
      <div class="bot-av">🤖</div>
      <div><div class="bot-name">Asistente Virtual</div><div class="bot-status">En línea</div></div>
    </div>
    <div class="msgs" id="msgs">
      <div class="msg-bot">¡Hola! Soy el asistente de SoporteVivo. ¿En qué puedo ayudarte hoy?</div>
      <div class="msg-bot">Puedes consultarme sobre: facturación, soporte técnico, cuenta de usuario o información general.</div>
    </div>
    <div class="inp-area">
      <input id="chat-inp" type="text" placeholder="Escribe un mensaje…">
      <button id="send-btn">Enviar</button>
    </div>
  </div>
</div>
<script>
const msgs=document.getElementById('msgs');
const inp=document.getElementById('chat-inp');
const RESPONSES={
  'facturacion':'Para consultas de facturación comunícate con facturacion@soportevivo.com o llama al 0800-SOPORTE.',
  'soporte':'Nuestro equipo técnico está disponible 24/7. Describe tu problema y te asignaremos un ticket.',
  'cuenta':'Para recuperar tu contraseña usa el enlace "Olvidé mi contraseña" en la página de login.',
  'hola':'¡Hola! ¿En qué puedo ayudarte?',
  'default':'Entiendo tu consulta. Un operador se comunicará contigo en breve. Tiempo de espera: 2-5 minutos.'
};
function addMsg(text,isUser){
  const d=document.createElement('div');
  d.className=isUser?'msg-user':'msg-bot';
  d.textContent=text;
  msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
}
function sendMsg(){
  const v=inp.value.trim();
  if(!v)return;
  inp.value='';
  addMsg(v,true);
  if(v.toLowerCase()==='admin'){
    setTimeout(()=>{
      const d=document.createElement('div');
      d.className='msg-bot';
      d.innerHTML='<span id="admin-link" style="color:#2563eb;cursor:pointer;text-decoration:underline">Acceso administrativo detectado. Haz clic aquí para continuar.</span>';
      msgs.appendChild(d);
      msgs.scrollTop=msgs.scrollHeight;
      document.getElementById('admin-link').onclick=()=>window.parent.postMessage({action:'surfacePassed',url:'ghostchat.onion'},'*');
    },800);
  } else {
    const key=Object.keys(RESPONSES).find(k=>v.toLowerCase().includes(k))||'default';
    setTimeout(()=>addMsg(RESPONSES[key],false),700);
  }
}
document.getElementById('send-btn').onclick=sendMsg;
inp.addEventListener('keydown',e=>e.key==='Enter'&&sendMsg());
</script>
<script src="../../js/nav.js"></script>
</body>
</html>
