<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BuscadorLibre — Búsqueda privada</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fff;font-family:Arial,sans-serif;color:#333}
.hdr{padding:14px 24px;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;gap:16px}
.logo{font-size:20px;font-weight:700;color:#1a73e8;white-space:nowrap}
.search-bar{flex:1;max-width:560px;display:flex;border:1px solid #ddd;border-radius:24px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.search-bar input{flex:1;border:none;outline:none;padding:10px 18px;font-size:14px}
.search-bar button{background:#1a73e8;border:none;color:#fff;padding:0 20px;cursor:pointer;font-size:13px}
.nav a{color:#555;text-decoration:none;font-size:13px;margin-left:14px}
.nav a:hover{color:#1a73e8}
.home-center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:24px}
.home-logo{font-size:56px;font-weight:700}
.home-logo .b{color:#1a73e8}.home-logo .r{color:#ea4335}.home-logo .y{color:#fbbc05}.home-logo .g{color:#34a853}
.home-bar{display:flex;max-width:540px;width:100%;border:1px solid #ddd;border-radius:24px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.1)}
.home-bar input{flex:1;border:none;outline:none;padding:13px 20px;font-size:15px}
.home-bar button{background:#1a73e8;border:none;color:#fff;padding:0 24px;cursor:pointer;font-size:14px}
.home-links{display:flex;gap:20px;font-size:13px}
.home-links a{color:#555;text-decoration:none}
.home-links a:hover{text-decoration:underline}
.notice{font-size:11px;color:#aaa;letter-spacing:.3px}
/* HIDDEN: "acceso" as a search result reveals the portal */
.special-result{display:none;border:1px solid #1a73e8;background:#f0f5ff;border-radius:6px;padding:12px 16px;max-width:540px;cursor:pointer;width:100%}
.special-result:hover{background:#e8effe}
.sr-url{font-size:11px;color:#1a5f2a;margin-bottom:4px}
.sr-title{font-size:16px;color:#1a73e8}
.sr-desc{font-size:13px;color:#555;margin-top:4px}
</style>
</head>
<body>
<div class="home-center" id="home-view">
  <div class="home-logo">
    <span class="b">B</span><span class="r">u</span><span class="y">s</span><span class="g">c</span><span class="b">a</span><span class="r">d</span><span class="y">o</span><span class="g">r</span><span style="color:#555">Libre</span>
  </div>
  <div class="home-bar">
    <input type="text" id="q" placeholder="Buscar…">
    <button onclick="doSearch()">Buscar</button>
  </div>
  <div id="special-result-wrap"></div>
  <div class="home-links"><a>Imágenes</a><a>Noticias</a><a>Mapas</a><a>Acerca</a></div>
  <div class="notice">Sin rastreo · Sin cookies · Resultados sin filtro</div>
</div>
<script>
function doSearch(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  const wrap=document.getElementById('special-result-wrap');
  if(q==='acceso'||q==='acceso privado'||q==='portal'){
    wrap.innerHTML=`
    <div class="special-result" onclick="enterPortal()">
      <div class="sr-url">⬡ portal.privado → acceso restringido</div>
      <div class="sr-title">Portal de Acceso — Área Restringida</div>
      <div class="sr-desc">Este resultado no está indexado públicamente. Haz clic para continuar.</div>
    </div>`;
  } else {
    wrap.innerHTML=`<div style="font-size:13px;color:#aaa;text-align:center">No se encontraron resultados para "<em>${q}</em>". Prueba con <span style="color:#1a73e8;cursor:pointer" onclick="document.getElementById('q').value='acceso';doSearch()">otro término</span>.</div>`;
  }
}
function enterPortal(){ window.parent.postMessage({action:'surfacePassed',url:'darksearch.onion'},'*'); }
document.getElementById('q').addEventListener('keydown',e=>e.key==='Enter'&&doSearch());
</script>
<script src="../../js/nav.js"></script>
</body>
</html>
